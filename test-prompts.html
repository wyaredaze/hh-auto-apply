<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HH AI Apply — Тест промптов</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; padding: 20px; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 18px; margin-bottom: 16px; color: #6c63ff; }
  label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  textarea { width: 100%; background: #16213e; color: #e0e0e0; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px; font-size: 13px; font-family: monospace; resize: vertical; }
  input, select { background: #16213e; color: #e0e0e0; border: 1px solid #2a2a4a; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  .btn { background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn:hover { background: #5a52e0; }
  .btn:disabled { background: #333; cursor: not-allowed; color: #666; }
  .btn-sm { padding: 2px 8px; font-size: 11px; background: #333; color: #aaa; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
  .section { background: #111; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .section-title { font-size: 14px; color: #fff; margin-bottom: 12px; font-weight: 600; }
  .row { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .col { flex: 1; min-width: 200px; }
  .step { background: #111; border-radius: 12px; padding: 16px; margin-bottom: 8px; border-left: 3px solid #333; }
  .step.active { border-left-color: #6c63ff; }
  .step.done { border-left-color: #4caf50; }
  .step.error { border-left-color: #e74c3c; }
  .step-header { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .step-num { width: 24px; height: 24px; border-radius: 50%; background: #333; color: #888; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
  .step.done .step-num { background: #4caf50; color: #fff; }
  .step.active .step-num { background: #6c63ff; color: #fff; }
  .step.error .step-num { background: #e74c3c; color: #fff; }
  .step-title { font-size: 13px; font-weight: 600; flex: 1; }
  .step-stats { font-size: 11px; color: #888; }
  .step-body { margin-top: 10px; display: none; }
  .step.active .step-body, .step.done .step-body, .step.error .step-body, .step.cached .step-body { display: block; }
  .result { background: #16213e; border-radius: 8px; padding: 10px; white-space: pre-wrap; font-size: 12px; line-height: 1.5; font-family: monospace; max-height: 300px; overflow-y: auto; }
  .log { background: #0a0a1a; border: 1px solid #2a2a4a; border-radius: 6px; padding: 8px; font-size: 11px; font-family: monospace; max-height: 100px; overflow-y: auto; color: #888; margin-bottom: 12px; }
  .log-entry { padding: 1px 0; }
  .log-ok { color: #4caf50; } .log-err { color: #e74c3c; } .log-warn { color: #ff9800; } .log-info { color: #aaa; }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #6c63ff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #333; border-radius: 9px; cursor: pointer; transition: .2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; left: 2px; bottom: 2px; background: #888; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .toggle-slider { background: #4caf50; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(14px); background: #fff; }
  .cache-label { font-size: 10px; color: #666; }
  .step.cached { border-left-color: #ff9800; }
  .step.cached .step-num { background: #ff9800; color: #fff; }
  .toolbar { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; align-items: center; }
</style>
</head>
<body>

<h1>HH AI Apply — Тест промптов</h1>

<div class="section">
  <div class="row">
    <div class="col" style="min-width:120px; flex:0.25">
      <label>Провайдер</label>
      <select id="provider" style="width:100%" onchange="onProviderChange()">

        <option value="openai">OpenAI</option>

<div class="section">

<div class="toolbar">

<div class="log" id="log"></div>

<div id="steps">

  <div class="step" id="step-2" data-step="2">

      <div class="step-num">2</div>
      <div class="step-title">Сжатие вакансии</div>
      <div class="step-stats" id="stats-2"></div>
      <label class="toggle" onclick="event.stopPropagation()" title="Кэшировать"><input type="checkbox" id="cache-2" onchange="saveCache()"><span class="toggle-slider"></span></label>
      <span class="cache-label">кэш</span>
      <button class="btn-sm" onclick="event.stopPropagation(); runStep(2)">запустить</button>
      <button class="btn-sm" onclick="event.stopPropagation(); copyStep(2)">копировать</button>

      <label class="toggle" onclick="event.stopPropagation()" title="Кэшировать"><input type="checkbox" id="cache-3" onchange="saveCache()"><span class="toggle-slider"></span></label>
      <span class="cache-label">кэш</span>
      <button class="btn-sm" onclick="event.stopPropagation(); runStep(3)">запустить</button>
      <button class="btn-sm" onclick="event.stopPropagation(); copyStep(3)">копировать</button>
    </div>

  <div class="step" id="step-4" data-step="4">

      <div class="step-num">4</div>

      <div class="step-stats" id="stats-4"></div>
      <label class="toggle" onclick="event.stopPropagation()" title="Кэшировать"><input type="checkbox" id="cache-4" onchange="saveCache()"><span class="toggle-slider"></span></label>
      <span class="cache-label">кэш</span>
      <button class="btn-sm" onclick="event.stopPropagation(); runStep(4)">запустить</button>
      <button class="btn-sm" onclick="event.stopPropagation(); copyStep(4)">копировать</button>

      <div class="step-num">5</div>

      <label class="toggle" onclick="event.stopPropagation()" title="Кэшировать"><input type="checkbox" id="cache-5" onchange="saveCache()"><span class="toggle-slider"></span></label>
      <span class="cache-label">кэш</span>

<script>
const SAVE_FIELDS = ['provider', 'host', 'port', 'model', 'resume', 'vacancy', 'questions'];
const DEFAULT_PORTS = { ollama: '11434', lmstudio: '1234', openai: '' };

function saveCache() {
  const c = {};
  for (let i = 1; i <= TOTAL_STEPS; i++) c[i] = document.getElementById(`cache-${i}`)?.checked || false;
  localStorage.setItem('hh-test-cache-flags', JSON.stringify(c));
}
function loadCache() {
  try {
    const c = JSON.parse(localStorage.getItem('hh-test-cache-flags'));
    if (!c) return;
    for (let i = 1; i <= TOTAL_STEPS; i++) { const el = document.getElementById(`cache-${i}`); if (c[i] && el) el.checked = true; }
  } catch {}
  // Восстановить кэшированные результаты
  try {
    const cached = JSON.parse(localStorage.getItem('hh-test-cache-data'));
    if (!cached) return;
    if (cached.compressedResume) state.compressedResume = cached.compressedResume;
    if (cached.compressedVacancy) state.compressedVacancy = cached.compressedVacancy;
    if (cached.facts) state.facts = cached.facts;
    if (cached.stepData) {
      for (const [k, v] of Object.entries(cached.stepData)) {
        state.stepData[k] = v;
        if (v.result) setStep(k, 'cached', v.result, v.stats);
      }
    }
  } catch {}
}
function saveCacheData() {
  const flags = {};
  for (let i = 1; i <= TOTAL_STEPS; i++) flags[i] = document.getElementById(`cache-${i}`)?.checked || false;
  const toSave = { stepData: {} };
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    if (flags[i] && state.stepData[i]) toSave.stepData[i] = state.stepData[i];
  }
  if (flags[1]) toSave.compressedResume = state.compressedResume;
  if (flags[2]) toSave.compressedVacancy = state.compressedVacancy;
  if (flags[3]) toSave.facts = state.facts;
  localStorage.setItem('hh-test-cache-data', JSON.stringify(toSave));
}
function isCached(n) {
  return (document.getElementById(`cache-${n}`)?.checked || false) && state.stepData[n]?.result;
}
const STEP_NAMES = { 1: 'Сжатие резюме', 2: 'Сжатие вакансии', 3: 'Подбор фактов', 4: 'Сопроводительное письмо', 5: 'Ответы на вопросы' };
const TOTAL_STEPS = 5;

let state = { compressedResume: '', compressedVacancy: '', facts: '', stepData: {} };

// --- Persistence ---
function saveFields() {
  const data = {};
  for (const id of SAVE_FIELDS) data[id] = document.getElementById(id).value;
  localStorage.setItem('hh-test-fields', JSON.stringify(data));
}
function loadFields() {
  try {
    const data = JSON.parse(localStorage.getItem('hh-test-fields'));
    if (!data) return;
    for (const id of SAVE_FIELDS) { if (data[id] !== undefined) document.getElementById(id).value = data[id]; }
  } catch {}
}

// --- Provider ---
function onProviderChange() {
  document.getElementById('port').value = DEFAULT_PORTS[document.getElementById('provider').value] || '11434';
  saveFields(); fetchModels();
}
async function fetchModels() {
  const provider = document.getElementById('provider').value;
  const host = document.getElementById('host').value || 'localhost';
  const port = document.getElementById('port').value;
  const sel = document.getElementById('model');
  const saved = sel.value;
  const url = provider === 'ollama' ? `http://${host}:${port}/api/tags` : `http://${host}:${port}/v1/models`;
  sel.innerHTML = '<option>загрузка...</option>';
  try {
    const data = await (await fetch(url)).json();
    const models = provider === 'ollama' ? (data.models||[]).map(m=>m.name) : (data.data||[]).map(m=>m.id);
    sel.innerHTML = models.map(m=>`<option value="${m}">${m}</option>`).join('');
    if (models.includes(saved)) sel.value = saved;
    saveFields(); log(`Моделей: ${models.length}`, 'ok');
  } catch(e) { sel.innerHTML = '<option>ошибка</option>'; log(e.message, 'err'); }
}

// --- LLM ---
async function askLLM(prompt) {
  const provider = document.getElementById('provider').value;
  const host = document.getElementById('host').value || 'localhost';
  const port = document.getElementById('port').value;
  const model = document.getElementById('model').value;
  const baseUrl = `http://${host}:${port}`;
  let url, body;
  if (provider === 'ollama') {
    url = `${baseUrl}/api/generate`;
    body = { model, prompt, stream: false, think: false, context: [] };
  } else {
    url = `${baseUrl}/v1/chat/completions`;
    body = { model, messages: [{role:'user',content:'/no_think\n'+prompt}], stream: false, stream_options:{include_usage:true} };
  }
  const t0 = performance.now();
  const resp = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  const elapsed = ((performance.now()-t0)/1000).toFixed(1);
  let text, usage;
  if (provider === 'ollama') { text = data.response||''; usage = {prompt_tokens:data.prompt_eval_count||0, completion_tokens:data.eval_count||0}; }
  else { text = data.choices?.[0]?.message?.content||''; usage = data.usage||{}; }
  text = text.replace(/<think>[\s\S]*?<\/think>/g,'').replace(/^[\s\S]*?<\/think>/g,'').replace(/<think>[\s\S]*$/g,'').trim();
  usage.total_tokens = (usage.prompt_tokens||0)+(usage.completion_tokens||0);
  return { text, usage, elapsed };
}

// --- Prompts ---
function promptCompress(resume) {
  return `СОЖМИ резюме МАКСИМАЛЬНО КОРОТКО. Каждая компания — ОДНА строка. Без буллетов, без markdown.

Формат:
ФИО, возраст, город, гражданство, контакты, должность
---
Компания (период), роль — достижение 1, достижение 2. Навыки: технологии.
---
Образование. Языки.
---
1 предложение о себе.

Пример:
Иванов Иван, 30 лет, Москва, Россия, +7 (999) 1234567, ivan@example.com, telegram: @ivan_dev, удалённо, Backend developer
---
Компания А (2024-н.в.), Backend — разработал портал 100k RPS, внедрил Redis-кеширование (снизил время ответа в 3 раза), построил полнотекстовый поиск на ES, настроил CI/CD на K8s. Навыки: PHP, Go, Redis, ES, Docker, K8s, GitLab CI.
Компания Б (2022-2024), Backend — спроектировал микросервисную архитектуру МФО (50k RPS), настроил Helm-деплой, оптимизировал очереди RabbitMQ. Навыки: PHP, Go, PostgreSQL, RabbitMQ, K8s, Helm.
---
Высшее. Русский, английский B1.
---
Backend-разработчик с 7+ лет опыта.

Правила:
- Каждая компания — 1-2 строки. Перефразируй кратко, но сохрани ВСЕ достижения с цифрами и метриками
- Даты копируй ТОЧНО из резюме
- Контакты копируй ТОЧНО (телефон, email, telegram: @username)
- Навыки компании — ВСЕ из резюме для этой компании, ни один не пропускай
- Образование — копируй точно (не меняй "среднее" на "высшее")

РЕЗЮМЕ:
${resume}`;
}
function promptVacancy(vacancy) {
  return `Сожми описание вакансии в короткий plain text. Без markdown. Каждый раздел с новой строки.\n\nФормат:\nПозиция: [название]\nЗадачи: [все обязанности через запятую]\nТребования: [языки, технологии, опыт, навыки — через запятую]\nПлюсом: [если есть — через запятую]\n\nУбери: описание компании, условия работы, бенефиты, воду.\n\nВАКАНСИЯ:\n${vacancy}`;
}
function promptFacts(resume, vacancy) {
  return `Найди совпадения между резюме и вакансией.

АЛГОРИТМ:
1. Собери ВСЕ требования и плюсы вакансии в один список
2. Для КАЖДОЙ компании:
   а) Сначала проверь строку "Навыки:" — выпиши ВСЕ совпадения с требованиями (PHP, PostgreSQL, Yii2, Linux, Redis и т.д.)
   б) Затем проверь текст достижений — выпиши подходы/практики (DDD, CQRS, микросервисы, CI/CD)
   в) Объедини всё в "Совпадения"
3. НЕ включай то, чего нет ни в навыках ни в достижениях

ФОРМАТ:
Компания (период): краткое достижение. Совпадения: навык1, навык2.

ЗАПРЕЩЕНО:
- Додумывать навыки. Если навыка НЕТ в строке "Навыки:" компании — НЕ включай его. Никаких "если предположить"
- Копировать достижения дословно из резюме — перефразируй в 1 предложение
- Пропускать компании с совпадениями
- Пропускать совпадения в тексте достижений. Если в достижении написано "внедрил DDD" и DDD есть в вакансии — включи DDD в совпадения
- Добавлять выводы и пояснения

ВАКАНСИЯ:
${vacancy}

РЕЗЮМЕ:
${resume}`;
}
function promptLetter(resume, vacancy, facts) {
  const contactsLine = resume.split('---')[0].trim();
  const fh = facts ? `\nФАКТЫ:\n${facts}\n` : '';
  // Извлекаем первую строку вакансии (название позиции)
  const vacancyTitle = (vacancy || '').split('\n')[0].replace(/^Позиция:\s*/i, '').trim();
  return `ЗАДАЧА: написать КОРОТКИЙ отклик на вакансию "${vacancyTitle}". Максимум 3-4 строки текста + контакты.
${fh}
СТРОГИЕ ПРАВИЛА:
1. Максимум 3 предложения. Больше — НЕЛЬЗЯ.
2. Прочитай раздел "Требования" вакансии. Выбери 2 компании из ФАКТОВ, у которых БОЛЬШЕ ВСЕГО совпадений именно с разделом "Требования" (не "Плюсом"). НЕ бери первую компанию по умолчанию.
3. Используй ТОЛЬКО навыки из ФАКТОВ. Упоминай в первую очередь навыки из НАЗВАНИЯ вакансии и раздела "Требования".
4. Пиши от первого лица, как в чате: "В Zaymigo я спроектировал...", а НЕ "Zaymigo: спроектировал...".
5. Контакты — ТОЛЬКО из секции КОНТАКТЫ ниже. Без имени перед контактами.

ЗАПРЕЩЕНО:
- Больше 4 предложений
- "Здравый день" — это ОШИБКА
- "Имею опыт", "коммерческий опыт", "Обладаю навыками", "аккумулировать", "углубить"
- "Благодарю за внимание", "Приложением к резюме"
- "делает мою кандидатуру идеальной", "уверен что подхожу"
- Любые шаблонные обороты

ФОРМАТ (нарушение = ошибка):
Строка 1: ТОЛЬКО "Приветствую!" или "Добрый день!" или "Здравствуйте!"
Строка 2: Короткая вводная — связь опыта с вакансией. Примеры: "Работал с [ключевой навык] в нескольких проектах." или "Стек совпадает — [навыки]." Без пафоса.
Строка 3: В [компания] я [достижение] с [навыки из совпадений].
Строка 4: В [компания] я [достижение] с [навыки].
Строка 5: "Буду рад пообщаться!" или "Напишите, обсудим!"
Строка 6: пустая
Строки 7+: контакты из секции КОНТАКТЫ, каждый с новой строки

ВАКАНСИЯ:
${vacancy}

КОНТАКТЫ:
${contactsLine}`;
}
function promptAnswer(resume, question) {
  return `Ты — кандидат, который отвечает на вопрос работодателя при отклике на вакансию.\n\nУпоминай только опыт и технологии из резюме. Если технологии нет в резюме — скажи честно и упомяни похожий опыт или готовность разобраться.\nОрганизационные вопросы (готовность к переезду, формат работы, самозанятость, зарплата) — отвечай коротко "Да/Нет", без выдумывания опыта.\nТеоретические вопросы ("Что такое X?", "Как работает Y?") — отвечай развёрнуто как специалист (3-5 предложений).\n\nПлохо: "Имею 7 лет коммерческого опыта в разработке backend-систем на PHP"\nХорошо: "7 лет пишу на PHP, последние 3 — Symfony на highload"\n\nПлохо: "Обладаю обширным опытом работы с реляционными СУБД"\nХорошо: "Работаю с PostgreSQL каждый день, в прошлом проекте оптимизировал тяжёлые запросы через explain analyze"\n\nПримеры ответов:\n\nВ: "Опыт с Kubernetes?"\nО: Да, на двух проектах настраивал кластеры и Helm-чарты, деплой шёл через GitLab CI.\n\nВ: "Знаете Flutter?"\nО: С Flutter не работал, но писал API для мобильных приложений — думаю, разберусь быстро.\n\nВ: "Готовы оформиться как самозанятый/ИП?"\nО: Да, готов.\n\nВ: "Что такое индекс в БД?"\nО: Индекс — структура данных, которая ускоряет поиск по таблице, примерно как алфавитный указатель в книге. Бывают B-tree, hash, GIN, GiST — каждый под свои задачи. B-tree подходит для сортировок и диапазонов, GIN — для полнотекстового поиска и jsonb. Минус — индексы замедляют запись и занимают место, поэтому создавать их нужно по реальным запросам.\n\nПиши от первого лица. Кратко (1-3 предложения). Без предисловий вроде "На основе резюме..." или "Исходя из моего опыта...".\n\nРЕЗЮМЕ:\n${resume}\n\nВОПРОС:\n${question}`;
}

// --- UI ---
function log(text, type='info') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = `log-entry log-${type}`;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function setStep(n, status, result, stats) {
  const el = document.getElementById(`step-${n}`);
  el.className = `step ${status}`;
  if (result !== undefined) document.getElementById(`result-${n}`).textContent = result;
  document.getElementById(`stats-${n}`).textContent = stats || '';
  state.stepData[n] = { name: STEP_NAMES[n], result: result || '', stats: stats || '' };
}

function copyStep(n) {
  let out = '';
  if (n === 1) {
    const resume = document.getElementById('resume').value;
    if (resume) out += `--- Резюме (оригинал) ---\n${resume}\n\n`;
  } else if (n === 2) {
    const vacancy = document.getElementById('vacancy').value;
    if (vacancy) out += `--- Вакансия (оригинал) ---\n${vacancy}\n\n`;
  } else if (n === 5) {
    const q = document.getElementById('questions').value;
    if (q) out += `--- Вопросы (оригинал) ---\n${q}\n\n`;
  }
  const from = (n <= 2) ? n : 1;
  for (let i = from; i <= n; i++) {
    const d = state.stepData[i];
    if (d?.result) out += `=== Шаг ${i}: ${d.name} ===\n${d.result}\n${d.stats}\n\n`;
  }
  if (!out) { log('Нет результатов для копирования', 'warn'); return; }
  navigator.clipboard.writeText(out.trim()).then(() => log(`Шаг ${n} скопирован`, 'ok'));
}

function toggleStep(n) {
  const body = document.getElementById(`step-${n}`).querySelector('.step-body');
  body.style.display = body.style.display === 'none' ? 'block' : (body.style.display === 'block' ? 'none' : 'block');
}

function fmtStats(usage, elapsed) {
  if (!usage) return elapsed ? `${elapsed}с` : '';
  return `${usage.prompt_tokens}+${usage.completion_tokens}=${usage.total_tokens} tok | ${elapsed}с`;
}

// --- Steps ---
async function step1() {
  const resume = document.getElementById('resume').value;
  if (!resume) { log('Введите резюме', 'err'); return; }
  setStep(1, 'active', 'Сжимаю резюме...', '');
  try {
    const r = await askLLM(promptCompress(resume));
    state.compressedResume = r.text;
    setStep(1, 'done', r.text, fmtStats(r.usage, r.elapsed));
    log('Шаг 1: резюме сжато', 'ok'); saveCacheData();
  } catch(e) { setStep(1, 'error', e.message); log(`Шаг 1: ${e.message}`, 'err'); }
}

async function step2() {
  const vacancy = document.getElementById('vacancy').value;
  if (!vacancy) { log('Введите вакансию', 'err'); return; }
  setStep(2, 'active', 'Сжимаю вакансию...', '');
  try {
    const r = await askLLM(promptVacancy(vacancy));
    state.compressedVacancy = r.text;
    setStep(2, 'done', r.text, fmtStats(r.usage, r.elapsed));
    log('Шаг 2: вакансия сжата', 'ok'); saveCacheData();
  } catch(e) { setStep(2, 'error', e.message); log(`Шаг 2: ${e.message}`, 'err'); }
}

async function step3() {
  const resume = state.compressedResume || document.getElementById('resume').value;
  const vacancy = state.compressedVacancy || document.getElementById('vacancy').value;
  if (!resume || !vacancy) { log('Нужны резюме и вакансия', 'err'); return; }
  setStep(3, 'active', 'Подбираю факты...', '');
  try {
    const r = await askLLM(promptFacts(resume, vacancy));
    state.facts = r.text;
    setStep(3, 'done', r.text, fmtStats(r.usage, r.elapsed));
    log('Шаг 3: факты подобраны', 'ok'); saveCacheData();
  } catch(e) { setStep(3, 'error', e.message); log(`Шаг 3: ${e.message}`, 'err'); }
}

async function step4() {
  const resume = state.compressedResume || document.getElementById('resume').value;
  const vacancy = state.compressedVacancy || document.getElementById('vacancy').value;
  if (!resume) { log('Нужно резюме', 'err'); return; }
  setStep(4, 'active', 'Генерирую письмо...', '');
  try {
    const r = await askLLM(promptLetter(resume, vacancy, state.facts));
    setStep(4, 'done', r.text, fmtStats(r.usage, r.elapsed));
    log('Шаг 4: письмо готово', 'ok'); saveCacheData();
  } catch(e) { setStep(4, 'error', e.message); log(`Шаг 4: ${e.message}`, 'err'); }
}

async function step5() {
  const resume = state.compressedResume || document.getElementById('resume').value;
  const raw = document.getElementById('questions').value.trim();
  if (!resume) { log('Нужно резюме', 'err'); return; }
  if (!raw) { setStep(5, 'done', 'Нет вопросов', ''); return; }
  const questions = raw.split('\n').map(q=>q.trim()).filter(Boolean);
  setStep(5, 'active', 'Отвечаю на вопросы...', '');
  let out = '', totalTok = 0, totalTime = 0;
  try {
    for (const q of questions) {
      log(`Вопрос: "${q}"...`, 'info');
      const r = await askLLM(promptAnswer(resume, q));
      out += `В: ${q}\nО: ${r.text}\n\n`;
      totalTok += r.usage.total_tokens;
      totalTime += parseFloat(r.elapsed);
    }
    setStep(5, 'done', out.trim(), `${totalTok} tok | ${totalTime.toFixed(1)}с`);
    log(`Шаг 5: ${questions.length} ответов`, 'ok'); saveCacheData();
  } catch(e) { setStep(5, 'error', out + '\n' + e.message); log(`Шаг 5: ${e.message}`, 'err'); }
}

async function runStep(n) {
  [step1, step2, step3, step4, step5][n-1]();
}

async function runAll() {
  log('Запуск всех шагов...', 'info');
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    if (isCached(i)) { log(`Шаг ${i}: из кэша`, 'warn'); continue; }
    await [step1, step2, step3, step4, step5][i-1]();
  }
  log('Все шаги завершены', 'ok');
}

function clearAll() {
  state = { compressedResume: '', compressedVacancy: '', matches: '', facts: '', stepData: {} };
  for (let i = 1; i <= TOTAL_STEPS; i++) { setStep(i, '', '', ''); }
  document.getElementById('log').innerHTML = '';
}

function copyAll() {
  const resume = document.getElementById('resume').value;
  const vacancy = document.getElementById('vacancy').value;
  const questions = document.getElementById('questions').value;
  let out = '';
  if (resume) out += `--- Резюме ---\n${resume}\n\n`;
  if (vacancy) out += `--- Вакансия ---\n${vacancy}\n\n`;
  if (questions) out += `--- Вопросы ---\n${questions}\n\n`;
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    const d = state.stepData[i];
    if (d && d.result) { out += `=== Шаг ${i}: ${d.name} ===\n${d.result}\n${d.stats}\n\n`; }
  }
  navigator.clipboard.writeText(out).then(() => log('Скопировано', 'ok'));
}

  document.getElementById(id)?.addEventListener('input', saveFields);
  document.getElementById(id)?.addEventListener('change', saveFields);
}
